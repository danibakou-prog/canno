<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التذاكر الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
        }
        .ticket-card {
            min-height: 400px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px dashed #cbd5e1;
            background: white;
            position: relative;
        }
        .ticket-card:hover {
            transform: translateY(-15px);
            border-color: #2563eb;
            box-shadow: 0 30px 50px -15px rgba(37, 99, 235, 0.2);
        }
        .hidden-page {
            display: none;
        }
        .ticket-cutout::before, .ticket-cutout::after {
            content: '';
            position: absolute;
            left: -20px;
            width: 40px;
            height: 40px;
            background: #e0e7ff;
            border-radius: 50%;
            top: 70%;
            transform: translateY(-50%);
        }
        .ticket-cutout::after {
            left: auto;
            right: -20px;
        }
        /* واجهة الموقع مع العداد */
        #site-viewer-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 100;
        }
        .floating-countdown {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 2px solid #2563eb;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-10">

    <!-- واجهة تسجيل الدخول -->
    <div id="auth-container" class="w-full max-w-lg p-12 glass-card">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-gray-900">تسجيل الدخول</h1>
            <p class="text-gray-500 mt-3 text-xl">مرحباً بك في منصة التذاكر</p>
        </div>
        <form onsubmit="event.preventDefault(); showTicketsPage();" class="space-y-6">
            <input type="email" required placeholder="البريد الإلكتروني" class="w-full px-6 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:outline-none text-lg">
            <input type="password" required placeholder="كلمة السر" class="w-full px-6 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:outline-none text-lg">
            <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl hover:bg-blue-700 transition-all shadow-xl">دخول</button>
        </form>
    </div>

    <!-- واجهة التذاكر -->
    <div id="tickets-container" class="hidden-page w-full max-w-[1600px]">
        <div class="flex justify-between items-center mb-16 bg-white p-10 rounded-[40px] shadow-xl border border-white">
            <h2 class="text-5xl font-black text-gray-900">التذاكر النشطة</h2>
            <button onclick="location.reload()" class="bg-gray-100 px-10 py-4 rounded-2xl font-black text-xl">خروج</button>
        </div>
        <div id="tickets-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10">
            <!-- التذاكر تولد عبر JS -->
        </div>
    </div>

    <!-- واجهة عرض الموقع مع العداد المدمج -->
    <div id="site-viewer-container" class="hidden-page">
        <div class="floating-countdown">
            <div class="text-blue-600 font-black text-4xl" id="timer-display">5</div>
            <div class="text-right">
                <div class="font-bold text-gray-800 text-sm">سيتم الإغلاق تلقائياً</div>
                <div class="text-xs text-gray-500">جاري تصفح الموقع...</div>
            </div>
        </div>
        <!-- ملاحظة: جوجل يمنع العرض في iframe، لذا نستخدم رابطاً تقنياً للتمثيل أو صفحة بحث -->
        <iframe id="target-frame" src="about:blank"></iframe>
    </div>

    <script>
        function showTicketsPage() {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('tickets-container').style.display = 'block';
            renderTickets();
        }

        function openSiteWithTimer() {
            const container = document.getElementById('site-viewer-container');
            const frame = document.getElementById('target-frame');
            const timerText = document.getElementById('timer-display');
            
            // إظهار واجهة العرض
            container.classList.remove('hidden-page');
            // ملاحظة: استبدلنا جوجل برابط ويكيبيديا أو صفحة مشابهة لأن جوجل يرفض الـ iframe
            // يمكنك تغيير الرابط لأي موقع يسمح بالعرض
            frame.src = "https://www.bing.com"; 

            let timeLeft = 5;
            timerText.innerText = timeLeft;

            const countdown = setInterval(() => {
                timeLeft--;
                timerText.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    // إغلاق العرض والعودة للتذاكر
                    container.classList.add('hidden-page');
                    frame.src = "about:blank";
                }
            }, 1000);
        }

        function renderTickets() {
            const grid = document.getElementById('tickets-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 8; i++) {
                const ticket = document.createElement('div');
                ticket.className = 'ticket-card p-10 flex flex-col items-center ticket-cutout cursor-pointer rounded-[32px]';
                ticket.onclick = openSiteWithTimer;
                ticket.innerHTML = `
                    <div class="text-center w-full flex-grow">
                        <div class="inline-flex p-6 bg-blue-100 rounded-3xl text-blue-700 mb-8">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
                            </svg>
                        </div>
                        <h3 class="text-3xl font-black text-gray-800 mb-3">تذكرة #${i}</h3>
                        <p class="text-xl font-bold text-blue-500">انقر للتصفح المؤقت</p>
                    </div>
                    <div class="ticket-divider text-center">
                        <div class="bg-blue-600 text-white py-4 px-6 rounded-2xl font-black">فتح الموقع مع عداد</div>
                    </div>
                `;
                grid.appendChild(ticket);
            }
        }
    </script>
</body>
</html>
