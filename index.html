<script type="module">
    // ... (نفس إعدادات Firebase السابقة)

    // الروابط الجديدة الخاصة بك
    const customLinks = [
        "https://www.profitablecpmratenetwork.com/jw3rniiam?key=2549f3c1e8bb50a2b75b5e231c40e1cf",
        "https://www.profitablecpmratenetwork.com/p9qjyutf?key=04b4b213dffd6cfb8639df9bde979198"
    ];

    function renderCards(uid) {
        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = '';
        
        // التكرار لبطاقتين فقط
        for(let i=1; i<=2; i++) {
            const cid = `card_${i}`;
            const div = document.createElement('div');
            div.id = cid;
            let finalLink = customLinks[i-1];
            
            setCardLocked(div, i, uid, cid, finalLink);
            grid.appendChild(div);

            onSnapshot(doc(window.db, "users", uid, "activatedCards", cid), (snap) => {
                if (snap.exists() && snap.data().active === true) {
                    const data = snap.data();
                    const now = Date.now();
                    const startTime = data.timestamp ? data.timestamp.toDate().getTime() : now;
                    const diff = (now - startTime) / 1000;

                    // تفعيل البطاقة لمدة 60 ثانية كمثال (يمكنك تغيير المدة)
                    if (diff < 60) {
                        const el = document.getElementById(cid);
                        if(el) {
                            el.className = "card-active p-6 rounded-2xl text-center shadow-lg";
                            el.innerHTML = `<span class="text-[10px] font-bold mb-1 block uppercase opacity-70">نشطة ✅</span><span class="text-xl font-black font-mono">#${Math.floor(1000 + Math.random()*8999)}</span>`;
                            el.onclick = null;
                            setTimeout(() => setCardLocked(el, i, uid, cid, finalLink), (60 - diff) * 1000);
                        }
                    } else {
                        setCardLocked(document.getElementById(cid), i, uid, cid, finalLink);
                    }
                }
            });
        }
    }

    function setCardLocked(div, i, uid, cid, finalLink) {
        div.className = "bg-slate-800 p-6 rounded-2xl text-center border border-white/5 cursor-pointer hover:border-indigo-500 transition shadow-inner";
        div.innerHTML = `<span class="text-3xl mb-3 block">🔒</span><p class="text-[10px] font-bold text-slate-400">البطاقة رقم ${i}</p>`;
        div.onclick = () => {
            localStorage.setItem('active_uid', uid);
            localStorage.setItem('active_cid', cid);
            
            // فتح رابط الإعلان في نافذة جديدة
            window.open(finalLink, '_blank');
            
            // تحويل الصفحة الحالية إلى صفحة التأكيد (الموجودة بالأسفل)
            // ملاحظة: افترضنا أن اسم ملف التأكيد هو verify.html
            setTimeout(() => {
                window.location.href = "verify.html"; 
            }, 500);
        };
    }
</script>
