<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التذاكر الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
        }
        .ticket-card {
            min-height: 400px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px dashed #cbd5e1;
            background: white;
            position: relative;
        }
        .ticket-card:hover {
            transform: translateY(-15px);
            border-color: #2563eb;
            box-shadow: 0 30px 50px -15px rgba(37, 99, 235, 0.2);
        }
        .hidden-page {
            display: none;
        }
        .ticket-cutout::before, .ticket-cutout::after {
            content: '';
            position: absolute;
            left: -20px;
            width: 40px;
            height: 40px;
            background: #e0e7ff;
            border-radius: 50%;
            top: 70%;
            transform: translateY(-50%);
        }
        .ticket-cutout::after {
            left: auto;
            right: -20px;
        }
        .ticket-divider {
            border-top: 3px dashed #f1f5f9;
            width: 100%;
            margin-top: auto;
            padding-top: 2rem;
            position: relative;
        }
        /* أنيميشن العداد */
        .countdown-circle {
            transition: stroke-dashoffset 1s linear;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-10">

    <!-- واجهة تسجيل الدخول / الاشتراك -->
    <div id="auth-container" class="w-full max-w-lg p-12 glass-card">
        <div class="text-center mb-10">
            <h1 id="auth-title" class="text-4xl font-black text-gray-900">تسجيل الدخول</h1>
            <p id="auth-subtitle" class="text-gray-500 mt-3 text-xl">مرحباً بك في منصة التذاكر</p>
        </div>

        <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-6">
            <div id="register-fields" class="hidden-page space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">رقم الهاتف</label>
                    <input type="tel" id="phone" placeholder="05xxxxxxxx" class="w-full px-6 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:outline-none transition-all text-lg">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">البريد الإلكتروني</label>
                <input type="email" id="email" required placeholder="name@company.com" class="w-full px-6 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:outline-none transition-all text-lg">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">كلمة السر</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full px-6 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:outline-none transition-all text-lg">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl hover:bg-blue-700 transform hover:scale-[1.02] active:scale-95 transition-all shadow-2xl shadow-blue-300 mt-8">
                دخول للنظام
            </button>
        </form>

        <div class="mt-10 text-center border-t border-gray-100 pt-8">
            <button onclick="toggleAuthMode()" id="toggle-link" class="text-blue-600 font-bold text-lg hover:text-blue-800 transition-colors">
                ليس لديك حساب؟ اشترك الآن
            </button>
        </div>
    </div>

    <!-- واجهة التذاكر -->
    <div id="tickets-container" class="hidden-page w-full max-w-[1600px]">
        <div class="flex flex-col md:flex-row justify-between items-center mb-16 bg-white p-10 rounded-[40px] shadow-xl border border-white">
            <div class="mb-6 md:mb-0 text-center md:text-right">
                <h2 class="text-5xl font-black text-gray-900 tracking-tight">التذاكر النشطة</h2>
                <p class="text-blue-600 text-2xl mt-2 font-medium">اختر تذكرة لبدء العد التنازلي</p>
            </div>
            <button onclick="logout()" class="bg-gray-100 text-gray-800 px-10 py-4 rounded-2xl hover:bg-red-500 hover:text-white transition-all font-black text-xl shadow-sm">
                خروج
            </button>
        </div>

        <div id="tickets-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 2xl:grid-cols-5 gap-10">
            <!-- التذاكر سيتم توليدها هنا -->
        </div>
    </div>

    <!-- واجهة العد التنازلي -->
    <div id="countdown-container" class="hidden-page w-full max-w-2xl text-center p-16 glass-card">
        <div class="relative inline-flex items-center justify-center mb-8">
            <svg class="w-48 h-48 transform -rotate-90">
                <circle cx="96" cy="96" r="88" stroke="currentColor" stroke-width="8" fill="transparent" class="text-gray-100" />
                <circle cx="96" cy="96" r="88" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="552.92" stroke-dashoffset="0" class="text-blue-600 countdown-circle" id="countdown-bar" />
            </svg>
            <span id="countdown-text" class="absolute text-7xl font-black text-gray-800">5</span>
        </div>
        <h2 class="text-4xl font-black text-gray-900 mb-4">جاري المعالجة...</h2>
        <p class="text-xl text-gray-500">يرجى الانتظار، ستعود تلقائياً إلى صفحة التذاكر خلال لحظات.</p>
        <div class="mt-10 flex justify-center">
            <div class="animate-bounce p-3 bg-blue-50 rounded-full text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewbox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const registerFields = document.getElementById('register-fields');
            const submitBtn = document.getElementById('submit-btn');
            const toggleLink = document.getElementById('toggle-link');

            if (isLoginMode) {
                title.innerText = 'تسجيل الدخول';
                subtitle.innerText = 'مرحباً بك في منصة التذاكر';
                registerFields.classList.add('hidden-page');
                submitBtn.innerText = 'دخول للنظام';
                toggleLink.innerText = 'ليس لديك حساب؟ اشترك الآن';
            } else {
                title.innerText = 'إنشاء حساب';
                subtitle.innerText = 'ابدأ رحلتك معنا واحصل على تذاكرك';
                registerFields.classList.remove('hidden-page');
                submitBtn.innerText = 'تأكيد الاشتراك';
                toggleLink.innerText = 'لديك حساب؟ سجل دخولك';
            }
        }

        function handleAuth(event) {
            event.preventDefault();
            showTicketsPage();
        }

        function showTicketsPage() {
            document.getElementById('auth-container').classList.add('hidden-page');
            document.getElementById('countdown-container').classList.add('hidden-page');
            document.getElementById('tickets-container').classList.remove('hidden-page');
            renderTickets();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function startCountdown() {
            document.getElementById('tickets-container').classList.add('hidden-page');
            document.getElementById('countdown-container').classList.remove('hidden-page');
            
            let timeLeft = 5;
            const countdownText = document.getElementById('countdown-text');
            const countdownBar = document.getElementById('countdown-bar');
            const totalDash = 552.92; // 2 * PI * r (r=88)

            countdownText.innerText = timeLeft;
            countdownBar.style.strokeDashoffset = 0;

            const timer = setInterval(() => {
                timeLeft -= 1;
                countdownText.innerText = timeLeft;
                
                // تحديث شريط التقدم الدائري
                const offset = totalDash - (totalDash * (timeLeft / 5));
                countdownBar.style.strokeDashoffset = offset;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    showTicketsPage(); // العودة التلقائية
                }
            }, 1000);
        }

        function renderTickets() {
            const grid = document.getElementById('tickets-grid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 10; i++) {
                const ticket = document.createElement('div');
                ticket.className = 'ticket-card p-10 flex flex-col items-center ticket-cutout cursor-pointer rounded-[32px] shadow-sm';
                
                ticket.addEventListener('click', startCountdown);
                
                ticket.innerHTML = `
                    <div class="text-center w-full flex-grow">
                        <div class="inline-flex p-6 bg-blue-100 rounded-3xl text-blue-700 mb-8">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewbox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
                            </svg>
                        </div>
                        <h3 class="text-3xl font-black text-gray-800 mb-3">تذكرة ذهبية</h3>
                        <p class="text-xl font-bold text-blue-500">رقم التسلسل: #${100 + i}</p>
                    </div>

                    <div class="ticket-divider text-center">
                        <div class="bg-blue-600 text-white py-4 px-6 rounded-2xl font-black text-lg shadow-lg">
                            استخدام التذكرة
                        </div>
                        <p class="text-xs text-gray-400 mt-4 font-bold uppercase tracking-widest">انتظار لمدة 5 ثوانٍ</p>
                    </div>
                `;
                grid.appendChild(ticket);
            }
        }

        function logout() {
            document.getElementById('tickets-container').classList.add('hidden-page');
            document.getElementById('countdown-container').classList.add('hidden-page');
            document.getElementById('auth-container').classList.remove('hidden-page');
            document.getElementById('auth-form').reset();
        }
    </script>
</body>
</html>
