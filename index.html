<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التذاكر الذكي - Aviso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
        }
        .ticket-card {
            min-height: 400px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px dashed #cbd5e1;
            background: white;
            position: relative;
        }
        .ticket-card:not(.activated):hover {
            transform: translateY(-15px);
            border-color: #2563eb;
            box-shadow: 0 30px 50px -15px rgba(37, 99, 235, 0.2);
        }
        .ticket-card.activated {
            border: 3px solid #10b981;
            background: #f0fdf4;
            cursor: default;
        }
        .hidden-page {
            display: none;
        }
        .ticket-cutout::before, .ticket-cutout::after {
            content: '';
            position: absolute;
            left: -20px;
            width: 40px;
            height: 40px;
            background: #e0e7ff;
            border-radius: 50%;
            top: 70%;
            transform: translateY(-50%);
        }
        .ticket-cutout::after {
            left: auto;
            right: -20px;
        }
        #site-viewer-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 100;
        }
        .floating-countdown {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid #2563eb;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-10">

    <!-- واجهة تسجيل الدخول -->
    <div id="auth-container" class="w-full max-w-lg p-12 glass-card">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-gray-900">تسجيل الدخول</h1>
            <p class="text-gray-500 mt-3 text-xl">منصة ربح المال والتذاكر</p>
        </div>
        <form onsubmit="event.preventDefault(); showTicketsPage();" class="space-y-6">
            <!-- حقل البريد الإلكتروني -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 mr-2">البريد الإلكتروني</label>
                <input type="email" required placeholder="example@mail.com" class="w-full px-6 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:outline-none text-lg text-right transition-all">
            </div>

            <!-- حقل رقم الهاتف المضاف -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 mr-2">رقم الهاتف</label>
                <div class="relative">
                    <input type="tel" required placeholder="05XXXXXXXX" class="w-full px-6 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:outline-none text-lg text-right transition-all">
                    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                    </div>
                </div>
            </div>

            <!-- حقل كلمة السر -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 mr-2">كلمة السر</label>
                <input type="password" required placeholder="••••••••" class="w-full px-6 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:outline-none text-lg text-right transition-all">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl hover:bg-blue-700 transition-all shadow-xl shadow-blue-200 active:scale-95 transform">
                دخول للنظام
            </button>
        </form>
        <p class="text-center mt-6 text-gray-500 text-sm">بمتابعتك، أنت توافق على شروط الخدمة</p>
    </div>

    <!-- واجهة التذاكر -->
    <div id="tickets-container" class="hidden-page w-full max-w-[1600px]">
        <div class="flex justify-between items-center mb-16 bg-white p-10 rounded-[40px] shadow-xl border border-white">
            <h2 class="text-5xl font-black text-gray-900">تذاكر Aviso</h2>
            <button onclick="location.reload()" class="bg-gray-100 px-10 py-4 rounded-2xl font-black text-xl hover:bg-red-500 hover:text-white transition-all">خروج</button>
        </div>
        <div id="tickets-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10">
            <!-- التذاكر تولد عبر JS -->
        </div>
    </div>

    <!-- واجهة عرض الموقع مع العداد المدمج -->
    <div id="site-viewer-container" class="hidden-page">
        <div class="floating-countdown">
            <div class="text-blue-600 font-black text-5xl" id="timer-display">5</div>
            <div class="text-right">
                <div class="font-bold text-gray-800 text-lg">سيتم التفعيل خلال</div>
                <div class="text-sm text-blue-500 font-bold">جاري عرض منصة Aviso...</div>
            </div>
        </div>
        <iframe id="target-frame" src="about:blank"></iframe>
    </div>

    <script>
        let currentTicketId = null;

        function showTicketsPage() {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('tickets-container').style.display = 'block';
            renderTickets();
        }

        function openAvisoWithTimer(ticketId) {
            const ticketElement = document.getElementById(`ticket-${ticketId}`);
            if (ticketElement.classList.contains('activated')) return;

            currentTicketId = ticketId;
            const container = document.getElementById('site-viewer-container');
            const frame = document.getElementById('target-frame');
            const timerText = document.getElementById('timer-display');
            
            container.classList.remove('hidden-page');
            frame.src = "https://aviso.bz/"; 

            let timeLeft = 5;
            timerText.innerText = timeLeft;

            const countdown = setInterval(() => {
                timeLeft--;
                timerText.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    container.classList.add('hidden-page');
                    frame.src = "about:blank";
                    activateTicket(currentTicketId);
                }
            }, 1000);
        }

        function activateTicket(id) {
            const ticket = document.getElementById(`ticket-${id}`);
            ticket.classList.add('activated');
            
            const iconContainer = ticket.querySelector('.icon-container');
            iconContainer.className = "icon-container inline-flex p-6 bg-green-100 rounded-3xl text-green-700 mb-8";
            iconContainer.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            `;

            const statusText = ticket.querySelector('.status-text');
            statusText.innerText = "تم التفعيل بنجاح";
            statusText.className = "status-text text-xl font-bold text-green-600 text-right";

            const btnText = ticket.querySelector('.btn-text');
            btnText.innerText = "تذكرة مفعلة ✅";
            btnText.parentElement.className = "bg-green-600 text-white py-4 px-6 rounded-2xl font-black text-xl shadow-lg";
        }

        function renderTickets() {
            const grid = document.getElementById('tickets-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 8; i++) {
                const ticket = document.createElement('div');
                ticket.id = `ticket-${i}`;
                ticket.className = 'ticket-card p-10 flex flex-col items-center ticket-cutout cursor-pointer rounded-[32px]';
                ticket.onclick = () => openAvisoWithTimer(i);
                ticket.innerHTML = `
                    <div class="text-center w-full flex-grow">
                        <div class="icon-container inline-flex p-6 bg-yellow-100 rounded-3xl text-yellow-700 mb-8">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <h3 class="text-3xl font-black text-gray-800 mb-3 text-right">تذكرة ربح Aviso</h3>
                        <p class="status-text text-xl font-bold text-blue-500 text-right">اضغط لبدء المهمة</p>
                    </div>
                    <div class="ticket-divider text-center">
                        <div class="bg-blue-600 text-white py-4 px-6 rounded-2xl font-black text-xl shadow-lg transition-colors">
                            <span class="btn-text">تفعيل التذكرة</span>
                        </div>
                    </div>
                `;
                grid.appendChild(ticket);
            }
        }
    </script>
</body>
</html>
