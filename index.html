<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المكافآت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }
        .page { display: none; }
        .page.active { display: block; }
        .card-active { background: linear-gradient(135deg, #10b981 0%, #064e3b 100%); border: 1px solid #34d399; }
    </style>
</head>
<body class="p-4">

    <div id="loginPage" class="page active max-w-md mx-auto mt-20 bg-white text-slate-900 p-8 rounded-3xl shadow-2xl">
        <h1 class="text-3xl font-black mb-6 text-indigo-600 text-center">دخول النظام 🎰</h1>
        <input type="email" id="emailInput" placeholder="البريد الإلكتروني" class="w-full p-4 mb-4 border rounded-2xl outline-none text-left" dir="ltr">
        <input type="password" id="passwordInput" placeholder="كلمة المرور" class="w-full p-4 mb-6 border rounded-2xl outline-none text-left" dir="ltr">
        <button id="authBtn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl">دخول</button>
    </div>

    <div id="dashboardPage" class="page max-w-2xl mx-auto mt-10">
        <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYipCdnHZXCkO3qKN9AqaWM9IDf9rOv04",
            authDomain: "soug-62f2f.firebaseapp.com",
            projectId: "soug-62f2f",
            storageBucket: "soug-62f2f.firebasestorage.app",
            messagingSenderId: "672944475308",
            appId: "1:672944475308:web:c8158bdf2c5613f51c2309"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const ads = [
            "https://www.profitablecpmratenetwork.com/jw3rniiam?key=2549f3c1e8bb50a2b75b5e231c40e1cf",
            "https://www.profitablecpmratenetwork.com/p9qjyutf?key=04b4b213dffd6cfb8639df9bde979198"
        ];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginPage').classList.remove('active');
                document.getElementById('dashboardPage').classList.add('active');
                renderCards(user.uid);
            }
        });

        document.getElementById('authBtn').onclick = async () => {
            const e = document.getElementById('emailInput').value;
            const p = document.getElementById('passwordInput').value;
            try { await signInWithEmailAndPassword(auth, e, p); }
            catch { await createUserWithEmailAndPassword(auth, e, p); }
        };

        function renderCards(uid) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            for(let i=1; i<=2; i++) {
                const cid = `card_${i}`;
                const div = document.createElement('div');
                div.id = cid;
                setCardLocked(div, i);
                grid.appendChild(div);

                onSnapshot(doc(db, "users", uid, "activatedCards", cid), (snap) => {
                    if (snap.exists() && snap.data().active === true) {
                        const diff = (Date.now() - snap.data().timestamp.toDate().getTime()) / 1000;
                        if (diff < 60) {
                            div.className = "card-active p-8 rounded-3xl text-center shadow-lg";
                            div.innerHTML = `✅ نشطة<br><span class="text-2xl font-black">#${Math.floor(1000+Math.random()*9000)}</span>`;
                            div.onclick = null;
                            setTimeout(() => renderCards(uid), (60 - diff) * 1000);
                        } else { setCardLocked(div, i); }
                    } else {
                        div.onclick = () => {
                            localStorage.setItem('active_uid', uid);
                            localStorage.setItem('active_cid', cid);
                            // فتح رابط الزيارة في نافذة جديدة
                            window.open(ads[i-1], '_blank');
                            // التوجه لصفحة التأكيد في نفس النافذة
                            window.location.href = "verify.html";
                        };
                    }
                });
            }
        }

        function setCardLocked(div, num) {
            div.className = "bg-slate-800 p-8 rounded-3xl text-center border border-white/5 cursor-pointer hover:border-indigo-500 transition";
            div.innerHTML = `<div class="text-4xl mb-2">🔒</div><p>البطاقة رقم ${num}</p><p class="text-[10px] text-slate-500 mt-2">اضغط لزيارة الرابط وتفعيل البطاقة</p>`;
        }
    </script>
</body>
</html>
