<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تأكيد الزيارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }</style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="text-center p-10 bg-slate-900 border border-indigo-500/30 rounded-3xl shadow-2xl max-w-sm">
        <h2 class="text-xl font-bold mb-4">جاري تسجيل الزيارة...</h2>
        <div id="timer" class="text-6xl font-black text-indigo-500 mb-4">5</div>
        <p class="text-slate-400 text-sm">سيتم تفعيل البطاقة تلقائياً فور انتهاء العداد</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* نفس الإعدادات السابقة */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let timeLeft = 5;
        const timerEl = document.getElementById('timer');

        const countdown = setInterval(async () => {
            timeLeft--;
            timerEl.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                const uid = localStorage.getItem('active_uid');
                const cid = localStorage.getItem('active_cid');
                
                if(uid && cid) {
                    await setDoc(doc(db, "users", uid, "activatedCards", cid), {
                        active: true,
                        timestamp: serverTimestamp()
                    });
                    window.location.href = "index.html"; // العودة للرئيسية بعد التفعيل
                }
            }
        }, 1000);
    </script>
</body>
</html>
