<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد التفعيل الآمن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div id="statusBox" class="text-center p-10 bg-slate-900 border border-indigo-500/30 rounded-3xl shadow-2xl max-w-sm w-full">
        <div id="loader" class="inline-block w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <div id="successIcon" class="hidden text-6xl mb-6 text-center">✅</div>
        <h2 id="msg" class="text-2xl font-bold text-center">جاري التحقق الرقمي...</h2>
        <p id="subMsg" class="text-slate-400 mt-2 text-sm text-center">نتأكد من صحة طلب التفعيل من السيرفر.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYipCdnHZXCkO3qKN9AqaWM9IDf9rOv04",
            authDomain: "soug-62f2f.firebaseapp.com",
            projectId: "soug-62f2f",
            storageBucket: "soug-62f2f.firebasestorage.app",
            messagingSenderId: "672944475308",
            appId: "1:672944475308:web:c8158bdf2c5613f51c2309",
            measurementId: "G-YE7431JXSF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function verify() {
            const uid = localStorage.getItem('active_uid');
            if (!uid) {
                updateUI("خطأ", "لم يتم العثور على جلسة مستخدم. يرجى الضغط من التطبيق.");
                return;
            }

            // البحث عن طلب التفعيل في الفايرباس
            const requestRef = doc(db, "activation_requests", uid);
            const requestSnap = await getDoc(requestRef);

            if (requestSnap.exists()) {
                const data = requestSnap.data();
                const now = Date.now();
                const reqTime = data.timestamp.toDate().getTime();

                // التحقق من الوقت (صلاحية الطلب 10 دقائق فقط)
                if (now - reqTime < 600000) {
                    const cid = data.cid;

                    // 1. تفعيل البطاقة رسمياً
                    await setDoc(doc(db, "users", uid, "activatedCards", cid), {
                        active: true,
                        timestamp: serverTimestamp()
                    });

                    // 2. حذف الطلب فوراً لكي لا يستخدم الرابط مرة أخرى (إغلاق الثغرة)
                    await deleteDoc(requestRef);

                    updateUI("تم التفعيل", "تم تنشيط البطاقة بنجاح!", true);
                    setTimeout(() => window.close(), 3000);
                } else {
                    updateUI("طلب منتهي", "انتهت صلاحية طلبك. حاول مجدداً.");
                    await deleteDoc(requestRef);
                }
            } else {
                updateUI("محاولة غش ⚠️", "لا يوجد طلب تفعيل مسجل لهذا المستخدم.");
            }
        }

        function updateUI(title, sub, success = false) {
            document.getElementById('loader').classList.add('hidden');
            if(success) document.getElementById('successIcon').classList.remove('hidden');
            document.getElementById('msg').innerText = title;
            document.getElementById('subMsg').innerText = sub;
            if(!success) document.getElementById('statusBox').classList.add('border-red-500');
        }

        window.onload = verify;
    </script>
</body>
</html>
