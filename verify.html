<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد التفعيل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div id="mainBox" class="text-center p-10 bg-slate-900 border border-indigo-500/30 rounded-3xl shadow-2xl max-w-sm w-full">
        <div id="loader" class="inline-block w-14 h-14 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <h2 id="msg" class="text-2xl font-bold mb-4">جاري تفعيل البطاقة...</h2>
        <div id="timer" class="text-5xl font-black text-indigo-500 mb-4">5</div>
        <p class="text-slate-400 text-sm">يرجى الانتظار قليلاً لتأكيد زيارتك وتنشيط البطاقة.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYipCdnHZXCkO3qKN9AqaWM9IDf9rOv04",
            authDomain: "soug-62f2f.firebaseapp.com",
            projectId: "soug-62f2f",
            storageBucket: "soug-62f2f.firebasestorage.app",
            messagingSenderId: "672944475308",
            appId: "1:672944475308:web:c8158bdf2c5613f51c2309",
            measurementId: "G-YE7431JXSF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let timeLeft = 5;
        const timerDisplay = document.getElementById('timer');
        const uid = localStorage.getItem('active_uid');
        const cid = localStorage.getItem('active_cid');

        const countdown = setInterval(async () => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                await processActivation();
            }
        }, 1000);

        async function processActivation() {
            if (uid && cid) {
                try {
                    await setDoc(doc(db, "users", uid, "activatedCards", cid), {
                        active: true,
                        timestamp: serverTimestamp()
                    });
                    
                    document.getElementById('msg').innerText = "تم التفعيل بنجاح! ✅";
                    document.getElementById('loader').style.display = 'none';
                    timerDisplay.style.display = 'none';
                    
                    // العودة لصفحة البطاقات
                    setTimeout(() => { window.location.href = "index.html"; }, 1500);
                } catch (e) {
                    document.getElementById('msg').innerText = "حدث خطأ في الاتصال";
                }
            } else {
                document.getElementById('msg').innerText = "خطأ: بيانات غير صالحة";
            }
        }
    </script>
</body>
</html>
