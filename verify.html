<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الزيارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="text-center p-10 bg-slate-900 border border-indigo-500/30 rounded-3xl shadow-2xl max-w-sm w-full">
        <h2 id="title" class="text-2xl font-bold mb-4 text-indigo-400">نظام الحماية</h2>
        <p id="subText" class="text-slate-400 mb-6 text-sm">يرجى الانتظار لتجهيز رابط التفعيل</p>
        
        <div id="timer" class="text-6xl font-black mb-8">5</div>

        <button id="verifyBtn" class="hidden w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl transition shadow-lg">
             اضغط هنا للتفعيل وفتح الرابط ✅
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYipCdnHZXCkO3qKN9AqaWM9IDf9rOv04",
            authDomain: "soug-62f2f.firebaseapp.com",
            projectId: "soug-62f2f",
            storageBucket: "soug-62f2f.firebasestorage.app",
            messagingSenderId: "672944475308",
            appId: "1:672944475308:web:c8158bdf2c5613f51c2309",
            measurementId: "G-YE7431JXSF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const ads = {
            "1": "https://www.profitablecpmratenetwork.com/jw3rniiam?key=2549f3c1e8bb50a2b75b5e231c40e1cf",
            "2": "https://www.profitablecpmratenetwork.com/p9qjyutf?key=04b4b213dffd6cfb8639df9bde979198"
        };

        const params = new URLSearchParams(window.location.search);
        const cardNum = params.get('id');
        const adLink = ads[cardNum] || ads["1"];

        let count = 5;
        const timerEl = document.getElementById('timer');
        const verifyBtn = document.getElementById('verifyBtn');

        const countdown = setInterval(() => {
            count--;
            timerEl.innerText = count;
            if (count <= 0) {
                clearInterval(countdown);
                timerEl.style.display = 'none';
                verifyBtn.classList.remove('hidden');
                document.getElementById('subText').innerText = "الرابط جاهز الآن";
            }
        }, 1000);

        verifyBtn.onclick = async () => {
            const uid = localStorage.getItem('active_uid');
            const cid = localStorage.getItem('active_cid');

            if (uid && cid) {
                // تفعيل البطاقة
                await setDoc(doc(db, "users", uid, "activatedCards", cid), {
                    active: true,
                    timestamp: serverTimestamp()
                });

                // فتح الإعلان في نافذة جديدة
                window.open(adLink, '_blank');

                // العودة للرئيسية
                window.location.href = "index.html";
            }
        };
    </script>
</body>
</html>
