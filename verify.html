<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تأكيد الزيارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div id="mainBox" class="text-center p-10 bg-slate-900 border border-indigo-500/30 rounded-3xl shadow-2xl max-w-sm w-full">
        <div id="loader" class="inline-block w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <h2 id="msg" class="text-2xl font-bold">جاري تأكيد الزيارة...</h2>
        <p id="timer" class="text-indigo-400 mt-4 text-2xl font-mono">5</p>
        <p class="text-slate-400 mt-2 text-sm">ابقَ في هذه الصفحة لتفعيل البطاقة.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // نفس firebaseConfig الخاص بك هنا
        const firebaseConfig = { ... }; 

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let count = 5;
        const timerEl = document.getElementById('timer');
        const uid = localStorage.getItem('active_uid');
        const cid = localStorage.getItem('active_cid');

        const countdown = setInterval(async () => {
            count--;
            timerEl.innerText = count;

            if (count <= 0) {
                clearInterval(countdown);
                await activateCard();
            }
        }, 1000);

        async function activateCard() {
            if (uid && cid) {
                try {
                    await setDoc(doc(db, "users", uid, "activatedCards", cid), {
                        active: true,
                        timestamp: serverTimestamp()
                    });
                    
                    document.getElementById('msg').innerText = "✅ تم التفعيل بنجاح!";
                    document.getElementById('loader').classList.add('hidden');
                    
                    // العودة لصفحة البطاقات بعد ثانية واحدة
                    setTimeout(() => {
                        window.location.href = "index.html"; // اسم صفحة البطاقات الرئيسية
                    }, 1500);
                } catch (e) {
                    alert("حدث خطأ أثناء التفعيل");
                }
            }
        }
    </script>
</body>
</html>
