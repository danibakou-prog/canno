<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تأكيد التفعيل الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen">
    <div id="statusBox" class="text-center p-10 bg-slate-900 border border-indigo-500/30 rounded-3xl shadow-2xl max-w-sm w-full">
        <h2 id="msg" class="text-2xl font-bold text-indigo-400">جاري التنشيط...</h2>
        <p id="subMsg" class="text-slate-400 mt-2 text-sm">نتحقق من السيرفر الآن</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYipCdnHZXCkO3qKN9AqaWM9IDf9rOv04",
            authDomain: "soug-62f2f.firebaseapp.com",
            projectId: "soug-62f2f",
            storageBucket: "soug-62f2f.firebasestorage.app",
            messagingSenderId: "672944475308",
            appId: "1:672944475308:web:c8158bdf2c5613f51c2309"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function verify() {
            const uid = localStorage.getItem('active_uid');
            if (!uid) return;

            const requestRef = doc(db, "activation_requests", uid);
            const snap = await getDoc(requestRef);

            if (snap.exists()) {
                const cid = snap.data().cid;
                
                // 1. تفعيل البطاقة المحددة
                await setDoc(doc(db, "users", uid, "activatedCards", cid), {
                    active: true,
                    timestamp: serverTimestamp()
                });

                // 2. حذف الطلب فوراً لمنع الغش بالتحديث
                await deleteDoc(requestRef);

                document.getElementById('msg').innerText = "تم التنشيط ✅";
                document.getElementById('subMsg').innerText = "تم تفعيل البطاقة بنجاح!";
                setTimeout(() => window.close(), 2000);
            } else {
                document.getElementById('msg').innerText = "خطأ ⚠️";
                document.getElementById('subMsg').innerText = "لا يوجد طلب تفعيل نشط حالياً.";
            }
        }

        window.onload = verify;
    </script>
</body>
</html>
